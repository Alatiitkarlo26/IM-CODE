<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCIMS - Authorized Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-page-container">
    <div class="login-wrapper">
        
        <div class="login-header">
            <img src="guitar_logo.png" alt="GCIMS Logo" class="guitar-icon">
            <h1>GCIMS</h1>
            <p>Guitar Center IMS</p>
        </div>

        <div class="login-form-box">
            
            <div class="role-selector">
                <p>Authorized Personnel Login:</p>
                <div class="role-buttons">
                    <button type="button" class="role-btn active" id="staff-role" onclick="setRole('Staff')">Staff</button>
                    <button type="button" class="role-btn" id="admin-role" onclick="setRole('Admin')">Admin</button>
                </div>
            </div>

            <form id="gcims-login-form">
                <input type="hidden" id="selected-role" value="Staff">
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="johier.parnton" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="submit-btn">Login to System</button>
            </form>

            <p class="login-footer">System Access strictly for authorized personnel only.</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
